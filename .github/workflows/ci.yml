name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: End-to-End Tests
    strategy:
      matrix:
        # macOS 26 and 27 might not be natively supported on GitHub-hosted runners yet.
        # But we specify them as requested. You might need self-hosted runners for 26 and 27.
        macos_version: [macos-14, macos-15, macos-26]
      fail-fast: false
    runs-on: ${{ matrix.macos_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download Metal Toolchain
        run: |
          sudo xcodebuild -runFirstLaunch
          for i in 1 2 3 4 5; do
            sudo xcodebuild -downloadComponent MetalToolchain && break || sleep 10
          done

      - name: Build and Test
        run: |
          sudo DevToolsSecurity -enable
          
          # Safely remove only the mach-services entitlement for the CI build.
          # This only affects the ephemeral CI runner and prevents amfid from killing the ad-hoc app.
          # Your actual repository file and production app are untouched.
          plutil -remove com.apple.security.mach-services DynamicIsland/DynamicIsland.entitlements || true
          
          xcodebuild test \
            -project DynamicIsland.xcodeproj \
            -scheme DynamicIsland \
            -destination "platform=macOS" \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=YES || {
              echo "Tests failed. Searching for crash logs..."
              find ~/Library/Logs/DiagnosticReports -name "*.crash" -print -exec cat {} +
              exit 1
            }

